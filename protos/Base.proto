message DashboardResponse {
  repeated DashboardItem items = 1;
  StatusResponse status = 2;
}

message DashboardSoLuongItem {
  string id = 1;
  string name = 2;
  int32 so_luong = 3; 
}

message ObjectValue{
  oneof value {
    google.protobuf.StringValue string_value = 1;
    google.protobuf.Int32Value int32_value = 2;
    google.protobuf.BoolValue bool_value = 3;
    google.protobuf.BytesValue bytes_value = 4;
    google.protobuf.DoubleValue double_value = 5;
    google.protobuf.FloatValue float_value = 6;
    google.protobuf.Int64Value int64_value = 7;
    google.protobuf.UInt32Value uint32_value = 8;
    google.protobuf.UInt64Value uint64_value = 9;
    google.protobuf.Timestamp timestamp = 10;
  }
}

message PheDuyetHistory{
  TrangThaiPheDuyet trang_thai = 1;
  google.protobuf.Timestamp ngay_thay_doi = 2;
  google.protobuf.StringValue nguoi_thay_doi = 3;
}
enum TrangThaiPheDuyet{
 CHUA_XAC_DINH=0;
 PHE_DUYET=1;
 HUY_DUYET=2;
}

message FilterDescriptor
{
  /// Gets or sets the name of the filtered property. 
  /// <value>The property.</value>
  google.protobuf.StringValue property = 1;

  /// Gets or sets the name of the filtered property. 
  /// <value>The property.</value>
  google.protobuf.StringValue filter_property = 2;
  /// Gets or sets the value to filter by.
  /// <value>The filter value.</value>
  ObjectValue filter_value = 3;
  /// Gets or sets the operator which will compare the property value with <see cref="FilterValue" />.
  /// <value>The filter operator.</value>
  Enum.FilterOperator filter_operator = 4;
  /// Gets or sets a second value to filter by.
  /// <value>The second filter value.</value>
  ObjectValue second_filter_value = 5;
  /// Gets or sets the operator which will compare the property value with <see cref="SecondFilterValue" />.
  /// <value>The second filter operator.</value>
  Enum.FilterOperator second_filter_operator = 6;
  /// Gets or sets the logic used to combine the outcome of filtering by <see cref="FilterValue" /> and <see cref="SecondFilterValue" />.
  /// <value>The logical filter operator.</value>
  Enum.LogicalFilterOperator logical_filter_operator = 7;
}