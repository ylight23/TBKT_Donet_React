syntax = "proto3";

option csharp_namespace = "protos"; 
package Base;

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "Enum.proto";

message StatusResponse {
  bool success = 1;
  string message = 2;
  string message_exception = 3;
}

message DeleteBaseResponse {
  bool   success          = 1;
  string message          = 2;
  string message_exception = 3;
}

message Parameters {
  map<string, google.protobuf.StringValue> items=1;
}

message RptRequestOptions{
  ReportTemplateType type = 1;
  bool download = 2;
  bool print_to_file = 3;
}

enum ReportTemplateType {
  BOTH = 0;
  EXCEL = 1;
  WORD = 2;
}
  
message RptResponse {
  bytes data = 1;
  google.protobuf.StringValue file_name = 2;
  bool success = 3;
  string message = 4;
  string message_exception = 5;
}

