syntax = "proto3";

option csharp_namespace = "protos";

package ThamSo;

import "google/protobuf/timestamp.proto";
import "Base.proto";

// ============================================================
// Service
// ============================================================
service ThamSoService {
  // DynamicField
  rpc GetListDynamicFields(GetListDynamicFieldsRequest) returns (GetListDynamicFieldsResponse);
  rpc SaveDynamicField(SaveDynamicFieldRequest) returns (SaveDynamicFieldResponse);
  rpc DeleteDynamicField(DeleteDynamicFieldRequest) returns (Base.DeleteBaseResponse);

  // FieldSet
  rpc GetListFieldSets(GetListFieldSetsRequest) returns (GetListFieldSetsResponse);
  rpc SaveFieldSet(SaveFieldSetRequest) returns (SaveFieldSetResponse);
  rpc DeleteFieldSet(DeleteFieldSetRequest) returns (Base.DeleteBaseResponse);

  // FormConfig
  rpc GetListFormConfigs(GetListFormConfigsRequest) returns (GetListFormConfigsResponse);
  rpc SaveFormConfig(SaveFormConfigRequest) returns (SaveFormConfigResponse);
  rpc DeleteFormConfig(DeleteFormConfigRequest) returns (Base.DeleteBaseResponse);

  // DynamicMenu
  rpc GetListDynamicMenus(GetListDynamicMenusRequest) returns (GetListDynamicMenusResponse);
  rpc SaveDynamicMenu(SaveDynamicMenuRequest) returns (SaveDynamicMenuResponse);
  rpc DeleteDynamicMenu(DeleteDynamicMenuRequest) returns (Base.DeleteBaseResponse);

  // DynamicMenu datasource registry
  rpc GetListDynamicMenuDataSources(GetListDynamicMenuDataSourcesRequest) returns (GetListDynamicMenuDataSourcesResponse);
  rpc SaveDynamicMenuDataSource(SaveDynamicMenuDataSourceRequest) returns (SaveDynamicMenuDataSourceResponse);
  rpc DeleteDynamicMenuDataSource(DeleteDynamicMenuDataSourceRequest) returns (Base.DeleteBaseResponse);
  rpc SyncDynamicMenuDataSourcesFromProto(SyncDynamicMenuDataSourcesFromProtoRequest) returns (SyncDynamicMenuDataSourcesFromProtoResponse);
  rpc DiscoverCollectionFields(DiscoverCollectionFieldsRequest) returns (DiscoverCollectionFieldsResponse);
  rpc GetDynamicMenuRows(GetDynamicMenuRowsRequest) returns (GetDynamicMenuRowsResponse);
}

// ============================================================
// DynamicField
// ============================================================
message FieldValidation {
  int32 min_length = 1;
  int32 max_length = 2;
  string pattern = 3;
  double min = 4;
  double max = 5;
  repeated string options = 6;
  string data_source = 7;
  string api_url = 8;
  string display_type = 9;
}

message DynamicField {
  string id = 1;
  string key = 2;
  string label = 3;
  string type = 4; // text | number | date | select | textarea | checkbox
  bool required = 5;
  FieldValidation validation = 6;
  bool delete = 7;
  google.protobuf.Timestamp create_date = 10;
  google.protobuf.Timestamp modify_date = 11;
}

message GetListDynamicFieldsRequest {}
message GetListDynamicFieldsResponse {
  repeated DynamicField items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message SaveDynamicFieldRequest {
  DynamicField item = 1;
  bool is_new = 2;
}
message SaveDynamicFieldResponse {
  DynamicField item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message DeleteDynamicFieldRequest {
  string id = 1;
  repeated string ids = 2;
}

// ============================================================
// FieldSet
// ============================================================
message FieldSet {
  string id = 1;
  string name = 2;
  string icon = 3; // MUI icon name, e.g. "Assignment", "Shield"
  string color = 4;
  string desc = 5;
  repeated DynamicField fields = 6; // danh sách dynamic fields thuộc set này
  bool delete = 7;
  google.protobuf.Timestamp create_date = 10;
  google.protobuf.Timestamp modify_date = 11;
}

message GetListFieldSetsRequest {}
message GetListFieldSetsResponse {
  repeated FieldSet items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message SaveFieldSetRequest {
  FieldSet item = 1;
  bool is_new = 2;
}
message SaveFieldSetResponse {
  FieldSet item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message DeleteFieldSetRequest {
  string id = 1;
  repeated string ids = 2;
}

// ============================================================
// FormConfig
// ============================================================
message FormTabConfig {
  string id = 1;
  string label = 2;
  repeated FieldSet field_sets = 3; // danh sách field sets thuộc tab này
}

message FormConfig {
  string id = 1;
  string name = 2;
  string desc = 3;
  repeated FormTabConfig tabs = 4;
  bool delete = 5;
  google.protobuf.Timestamp create_date = 10;
  google.protobuf.Timestamp modify_date = 11;
}

message GetListFormConfigsRequest {}
message GetListFormConfigsResponse {
  repeated FormConfig items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message SaveFormConfigRequest {
  FormConfig item = 1;
  bool is_new = 2;
}
message SaveFormConfigResponse {
  FormConfig item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message DeleteFormConfigRequest {
  string id = 1;
  repeated string ids = 2;
}

// ============================================================
// DynamicMenu
// ============================================================
message DynamicMenu {
  string id = 1;
  string title = 2;
  string path = 3;
  string active = 4;
  int32 grid_count = 5;
  bool enabled = 6;
  bool delete = 7;
  string icon = 8;
  int32 column_count = 9;
  string data_source = 13;
  repeated string column_keys = 14;
  repeated string column_names = 12;
  google.protobuf.Timestamp create_date = 10;
  google.protobuf.Timestamp modify_date = 11;
}

message GetListDynamicMenusRequest {}
message GetListDynamicMenusResponse {
  repeated DynamicMenu items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message SaveDynamicMenuRequest {
  DynamicMenu item = 1;
  bool is_new = 2;
}
message SaveDynamicMenuResponse {
  DynamicMenu item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message DeleteDynamicMenuRequest {
  string id = 1;
  repeated string ids = 2;
}

// ============================================================
// DynamicMenu datasource registry
// ============================================================
message DynamicMenuDataSourceField {
  string key = 1;
  string label = 2;
  string data_type = 3;
}

message DynamicMenuDataSource {
  string id = 1;
  string source_key = 2;
  string source_name = 3;
  string collection_name = 4;
  repeated DynamicMenuDataSourceField fields = 5;
  bool enabled = 6;
  bool delete = 7;
  google.protobuf.Timestamp create_date = 10;
  google.protobuf.Timestamp modify_date = 11;
}

message GetListDynamicMenuDataSourcesRequest {}
message GetListDynamicMenuDataSourcesResponse {
  repeated DynamicMenuDataSource items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message SaveDynamicMenuDataSourceRequest {
  DynamicMenuDataSource item = 1;
  bool is_new = 2;
}

message SaveDynamicMenuDataSourceResponse {
  DynamicMenuDataSource item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message DeleteDynamicMenuDataSourceRequest {
  string id = 1;
  repeated string ids = 2;
}

// source_key: nếu rỗng → sync tất cả các entry đã đăng ký trong proto map
// nếu có giá trị → chỉ sync source_key đó
message SyncDynamicMenuDataSourcesFromProtoRequest {
  string source_key = 1;
}

message SyncDynamicMenuDataSourcesFromProtoResponse {
  repeated DynamicMenuDataSource items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

// Scan tối đa 50 documents trong collection để tự động phát hiện fields
message DiscoverCollectionFieldsRequest {
  string collection_name = 1;
}

message DiscoverCollectionFieldsResponse {
  string collection_name = 1;
  repeated DynamicMenuDataSourceField fields = 2;
  int32 documents_scanned = 3;
  bool success = 4;
  string message = 5;
  string message_exception = 6;
}

// Generic data rows for dynamic menu rendering.
message GetDynamicMenuRowsRequest {
  string source_key = 1;
  int32 limit = 2;
}

message GetDynamicMenuRowsResponse {
  repeated string rows_json = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}
