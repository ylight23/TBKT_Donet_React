syntax = "proto3";

option csharp_namespace = "protos";
import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "ExtendedField.proto";
import "Pager.proto";

package catalog;
 
service CatalogService {  
  rpc GetListCatalog (CatalogListRequest) returns (CatalogListResponse);
  rpc GetCatalog (CatalogRequest) returns (CatalogResponse);
  rpc DeleteCatalog (CatalogRequest) returns (CatalogDeleteResponse);
  rpc SaveCatalog (SaveCatalogRequest) returns (SaveCatalogResponse);   
  rpc GetLastCatalog (CatalogListRequest) returns (CatalogResponse);
  rpc GetMaxCatalog (CatalogListRequest) returns (CatalogResponse);

  rpc GetListCatalogTree (CatalogTreeListRequest) returns (CatalogTreeListResponse); 
  rpc GetCatalogTree (CatalogTreeRequest) returns (CatalogTreeResponse);
  rpc DeleteCatalogTree (CatalogTreeRequest) returns (CatalogTreeDeleteResponse);
  rpc SaveCatalogTree (SaveCatalogTreeRequest) returns (SaveCatalogTreeResponse);
  rpc GetLastCatalogTree (CatalogTreeListRequest) returns (CatalogTreeResponse);
  rpc GetMaxCatalogTree (CatalogTreeListRequest) returns (CatalogTreeResponse);
  rpc ReorderCatalogTree (ReorderCatalogTreeRequest) returns (SaveCatalogTreeResponse);


  rpc UploadCatalogFromExcel (UploadCatalogFromExcelRequest) returns (UploadCatalogFromExcelResponse);
  rpc SaveCatalogFromExcel (SaveCatalogFromExcelRequest) returns (SaveCatalogFromExcelResponse);
}

message SaveCatalogFromExcelRequest{
  repeated Catalog items = 1;
  string catalog_name = 2;
}

message SaveCatalogFromExcelResponse{
  repeated Catalog items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message UploadCatalogFromExcelRequest{
  repeated CatalogFileData items = 1;
}

message UploadCatalogFromExcelResponse {
  repeated Catalog items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message CatalogFileData {
  string token = 1;
  string file_name = 2;
  int32 count=3;
  int32 index=4;
  bytes data = 5;
  bool finished=6;
}

message ReorderCatalogTreeRequest{
  string id = 1;
  bool is_up = 2;
  int32 level_length = 3;
  string catalog_name = 4;
}

// The request message containing the user's name.
message CatalogListRequest {
  google.protobuf.StringValue catalog_name = 1;
  google.protobuf.StringValue search_text = 2;
  repeated string in_list_ids = 3;
  bool only_in_list_ids = 4;
  repeated ExtendedField.ExtendedField extended_fields = 5;
  Pager.PagerSettings pager = 6;
  repeated string include_fields = 7;
}

// The response message containing the greetings.
message CatalogListResponse {
  repeated Catalog items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message CatalogRequest {
  google.protobuf.StringValue id = 1;
  google.protobuf.StringValue catalog_name = 2;
}

// The response message containing the greetings.
message CatalogResponse {
  Catalog item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message CatalogDeleteResponse {
  bool success = 1;
  string message = 2;
  string message_exception = 3;
}

message SaveCatalogRequest {
  Catalog item = 1;
  google.protobuf.StringValue catalog_name = 2;
  bool is_new = 3;
  google.protobuf.StringValue old_id = 4;
}

message SaveCatalogResponse {
  string id = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
} 

message Catalog{
	google.protobuf.StringValue id = 1;
	google.protobuf.StringValue ten = 2;
	google.protobuf.StringValue viet_tat = 3;
	int32 thu_tu = 4; 
  repeated string tags = 5;
	repeated ExtendedField.ExtendedField parameters = 6;
	google.protobuf.StringValue nguoi_tao = 10;
	google.protobuf.StringValue nguoi_sua = 11;
	google.protobuf.Timestamp ngay_tao = 12;
	google.protobuf.Timestamp ngay_sua = 13; 
} 



 
message CatalogTreeListRequest {
  google.protobuf.StringValue catalog_name = 1;
  google.protobuf.StringValue parent_id = 2;
  bool load_all = 3;
  repeated ExtendedField.ExtendedField extended_fields = 4;
  repeated string in_ids = 5;
  bool exclude_leaf = 6;
  bool only_leaf = 7;
  google.protobuf.StringValue search_text = 8;
}
 
message CatalogTreeListResponse {
  repeated CatalogTree items = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message CatalogTreeRequest {
  google.protobuf.StringValue catalog_name = 1;
  google.protobuf.StringValue id = 2;
}
 
message CatalogTreeResponse {
  CatalogTree item = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message CatalogTreeDeleteResponse {
  google.protobuf.StringValue catalog_name = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message SaveCatalogTreeRequest {
	google.protobuf.StringValue catalog_name = 1;
	CatalogTree item = 2;
	bool is_new = 3;
	google.protobuf.StringValue old_id = 4;
	int32 level_length = 5;
}

message SaveCatalogTreeResponse {
  string id = 1;
  bool success = 2;
  string message = 3;
  string message_exception = 4;
}

message CatalogTree {
	google.protobuf.StringValue id = 1;
	google.protobuf.StringValue id_cap_tren = 2;
	google.protobuf.StringValue ten = 3; 
	google.protobuf.StringValue viet_tat = 4;
	google.protobuf.StringValue ten_in = 5;
	google.protobuf.StringValue ten_day_du = 6; 
	bool co_cap_duoi = 7;
  repeated string tags = 8;
	int32 thu_tu = 9;
	google.protobuf.StringValue thu_tu_sap_xep = 10;
	repeated ExtendedField.ExtendedField parameters = 11;
	repeated CatalogTree child = 12; 
	google.protobuf.StringValue nguoi_tao = 30;
	google.protobuf.StringValue nguoi_sua = 31;
	google.protobuf.Timestamp ngay_tao = 32;
	google.protobuf.Timestamp ngay_sua = 33; 
}