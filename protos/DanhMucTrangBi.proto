syntax = "proto3";

option csharp_namespace = "protos";

package DanhMucTrangBi;

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "ExtendedField.proto";
import "ThamSo.proto";
import "Base.proto";

message TrangBiTree {
  google.protobuf.StringValue id = 1;
  google.protobuf.StringValue id_cap_tren = 2;
  google.protobuf.StringValue ten = 3;
  google.protobuf.StringValue viet_tat = 4;
  google.protobuf.StringValue ten_day_du = 5;
  bool co_cap_duoi = 6;
  int32 thu_tu = 7;
  google.protobuf.StringValue thu_tu_sap_xep = 8;
  repeated ExtendedField.ExtendedField parameters = 9;
  google.protobuf.StringValue id_chuyen_nganh_kt = 10;
  google.protobuf.StringValue nguoi_tao = 11;
  google.protobuf.StringValue nguoi_sua = 12;
  google.protobuf.Timestamp ngay_tao = 13;
  google.protobuf.Timestamp ngay_sua = 14;
}

message TrangBiTreeListRequest {
  google.protobuf.StringValue parent_id = 1;
  bool load_all = 2;
  google.protobuf.StringValue search_text = 3;
}

message TrangBiTreeListResponse {
  repeated TrangBiTree items = 1;
  bool success = 2;
  string message = 3;
}

message GetListMaDinhDanhTrangBiRequest {
  google.protobuf.StringValue search_text = 1;
  bool only_leaf = 2;
}

message MaDinhDanhTrangBiItem {
  google.protobuf.StringValue id = 1;
  google.protobuf.StringValue label = 2;
  google.protobuf.StringValue parent_id = 3;
  bool is_leaf = 4;
}

message GetListMaDinhDanhTrangBiResponse {
  repeated MaDinhDanhTrangBiItem items = 1;
  bool success = 2;
  string message = 3;
}

message TrangBiTreeGetRequest {
  string id = 1;
}

message TrangBiTreeGetResponse {
  TrangBiTree item = 1;
  bool success = 2;
  string message = 3;
}

message SaveTrangBiTreeRequest {
  TrangBiTree item = 1;
  bool is_new = 2;
  google.protobuf.StringValue old_id = 3;
  int32 level_length = 4;
}

message SaveTrangBiTreeResponse {
  string id = 1;
  bool success = 2;
  string message = 3;
}

message DeleteTrangBiTreeRequest {
  string id = 1;
}

message DeleteTrangBiTreeResponse {
  bool success = 1;
  string message = 2;
}

// ============================================================
// GetFieldSetsByMaDanhMuc – tra cứu FieldSet theo mã danh mục trang bị
// ============================================================
message GetFieldSetsByMaDanhMucRequest {
  string ma_danh_muc = 1; // _id DanhMucTrangBi đang chọn (ví dụ: "B.1.01.00.00.00.001")
}

message GetFieldSetsByMaDanhMucResponse {
  repeated ThamSo.FieldSetDetail items = 1;
  Base.ResponseMeta meta = 2;
}

// ============================================================
// SaveTrangBiNhom1 – lưu bản ghi trang bị (equipment instance)
// ============================================================
message TrangBiNhom1Record {
  string id = 1;                                              // GUID, tự sinh khi tạo mới
  string ma_danh_muc = 2;                                     // _id DanhMucTrangBi (loại trang bị)
  google.protobuf.StringValue id_cap_tren = 3;                // mã cấp trên (DanhMucTrangBi cha)
  google.protobuf.StringValue ten_danh_muc = 4;               // tên danh mục trang bị
  google.protobuf.StringValue id_chuyen_nganh_kt = 5;         // chuyên ngành kỹ thuật (CN scope)
  map<string, string> parameters = 6;                         // tất cả trường động từ FormConfig
  google.protobuf.StringValue nguoi_tao = 7;
  google.protobuf.StringValue nguoi_sua = 8;
  google.protobuf.Timestamp ngay_tao = 9;
  google.protobuf.Timestamp ngay_sua = 10;
}

message SaveTrangBiNhom1Request {
  TrangBiNhom1Record item = 1;
  bool is_new = 2;
}

message SaveTrangBiNhom1Response {
  string id = 1;
  bool success = 2;
  string message = 3;
}

// ============================================================
// GetListTrangBiNhom1 – lấy danh sách bản ghi trang bị nhóm 1
// ============================================================
message GetListTrangBiNhom1Request {
  google.protobuf.StringValue id_chuyen_nganh_kt = 1;   // lọc theo chuyên ngành (tùy chọn)
  google.protobuf.StringValue ma_danh_muc = 2;           // lọc theo danh mục trang bị (tùy chọn)
  google.protobuf.StringValue search_text = 3;           // tìm kiếm toàn văn (tùy chọn)
}

message TrangBiNhom1GridItem {
  string id = 1;
  string ma_danh_muc = 2;
  string ten_danh_muc = 3;
  string id_cap_tren = 4;      // Phân ngành (UI header) – top-level IdCapTren của danh mục
  string id_chuyen_nganh_kt = 5;
  string so_hieu = 6;
  string don_vi = 7;
  string don_vi_quan_ly = 8;
  string loai = 9;
  string chat_luong = 10;
  string trang_thai = 11;
  string tinh_trang_ky_thuat = 12;
  int32 nam_san_xuat = 13;
  int32 nam_su_dung = 14;
  int32 nien_han_su_dung = 15;
  string nuoc_san_xuat = 16;
  string hang_san_xuat = 17;
}

message GetListTrangBiNhom1Response {
  repeated TrangBiNhom1GridItem items = 1;
  bool success = 2;
  string message = 3;
}

message GetTrangBiNhom1Request {
  string id = 1;
}

message GetTrangBiNhom1Response {
  TrangBiNhom1Record item = 1;
  bool success = 2;
  string message = 3;
}

message TrangBiNhom2Record {
  string id = 1;
  string ma_danh_muc = 2;
  google.protobuf.StringValue id_cap_tren = 3;
  google.protobuf.StringValue ten_danh_muc = 4;
  google.protobuf.StringValue id_chuyen_nganh_kt = 5;
  map<string, string> parameters = 6;                         // tất cả trường động từ FormConfig
  google.protobuf.StringValue nguoi_tao = 7;
  google.protobuf.StringValue nguoi_sua = 8;
  google.protobuf.Timestamp ngay_tao = 9;
  google.protobuf.Timestamp ngay_sua = 10;
}

message SaveTrangBiNhom2Request {
  TrangBiNhom2Record item = 1;
  bool is_new = 2;
}

message SaveTrangBiNhom2Response {
  string id = 1;
  bool success = 2;
  string message = 3;
}

message GetListTrangBiNhom2Request {
  google.protobuf.StringValue id_chuyen_nganh_kt = 1;
  google.protobuf.StringValue ma_danh_muc = 2;
  google.protobuf.StringValue search_text = 3;
}

message TrangBiNhom2GridItem {
  string id = 1;
  string ma_danh_muc = 2;
  string ten_danh_muc = 3;
  string id_cap_tren = 4;      // Phân ngành (UI header) – top-level IdCapTren của danh mục
  string id_chuyen_nganh_kt = 5;
  string so_hieu = 6;
  string don_vi = 7;
  string don_vi_quan_ly = 8;
  string loai = 9;
  string chat_luong = 10;
  string trang_thai = 11;
  string tinh_trang_ky_thuat = 12;
  int32 nam_san_xuat = 13;
  int32 nam_su_dung = 14;
  int32 nien_han_su_dung = 15;
  string nuoc_san_xuat = 16;
  string hang_san_xuat = 17;
}

message GetListTrangBiNhom2Response {
  repeated TrangBiNhom2GridItem items = 1;
  bool success = 2;
  string message = 3;
}

service DanhMucTrangBiService {
  rpc GetListMaDinhDanhTrangBi (GetListMaDinhDanhTrangBiRequest) returns (GetListMaDinhDanhTrangBiResponse);
  rpc GetListTree (TrangBiTreeListRequest) returns (TrangBiTreeListResponse);
  rpc GetTree (TrangBiTreeGetRequest) returns (TrangBiTreeGetResponse);
  rpc SaveTree (SaveTrangBiTreeRequest) returns (SaveTrangBiTreeResponse);
  rpc DeleteTree (DeleteTrangBiTreeRequest) returns (DeleteTrangBiTreeResponse);
  rpc GetFieldSetsByMaDanhMuc (GetFieldSetsByMaDanhMucRequest) returns (GetFieldSetsByMaDanhMucResponse);
  rpc SaveTrangBiNhom1 (SaveTrangBiNhom1Request) returns (SaveTrangBiNhom1Response);
  rpc GetListTrangBiNhom1 (GetListTrangBiNhom1Request) returns (GetListTrangBiNhom1Response);
  rpc GetTrangBiNhom1 (GetTrangBiNhom1Request) returns (GetTrangBiNhom1Response);
  rpc SaveTrangBiNhom2 (SaveTrangBiNhom2Request) returns (SaveTrangBiNhom2Response);
  rpc GetListTrangBiNhom2 (GetListTrangBiNhom2Request) returns (GetListTrangBiNhom2Response);
}
