syntax = "proto3";

option csharp_namespace = "protos";
import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "Base.proto";
package ExtendedField;

message ExtendedField {
  string id = 1;
  string owner_id = 2;
  string owner_name = 3;
  string name = 4;
  google.protobuf.Int32Value int_value = 5;
  google.protobuf.BoolValue bool_value = 6;
  google.protobuf.StringValue string_value = 7;
  google.protobuf.DoubleValue double_value = 8;
  google.protobuf.Timestamp date_time_value = 9;
  google.protobuf.BytesValue bytes_value = 10;
}

message ExtendPropertyDefine {
  string name = 1;
  string caption = 2;
  google.protobuf.StringValue catalog_name = 3;
  DataType data_type = 4;
  google.protobuf.StringValue catalog_name_for_data_type_list = 5;
  double min = 6;
  double max = 7;
  bool multiple = 8;
  repeated Base.FilterDescriptor filters = 9;
  repeated string include_fields = 10;
  repeated Option options = 11;
  bool is_required = 12;
  google.protobuf.StringValue suffix = 13;
  google.protobuf.Int32Value ordering = 14;
}
message Option {
  string key = 1;
  string value = 2;
}
enum DataType {
  INT = 0;
  DOUBLE = 1;
  STRING = 2;
  DATE_TIME = 3;
  TIME = 4;
  BOOL = 5;
  LIST = 6;
  TREE = 7;
  COLOR = 8;
  FILE_ATTACH = 9;
  HTML = 10;
  MEMO = 11;
  IMAGE = 12;
  VIDEO = 13;
  MEDIA = 14;
}