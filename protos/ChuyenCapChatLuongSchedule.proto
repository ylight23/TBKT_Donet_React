syntax = "proto3";

option csharp_namespace = "protos";

package ChuyenCapChatLuongSchedule;

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "Base.proto";

message ChuyenCapChatLuongScheduleTrangBiItem {
  string id_trang_bi = 1;
  int32 nhom_trang_bi = 2;
  string ma_danh_muc = 3;
  string ten_danh_muc = 4;
  string so_hieu = 5;
  string id_chuyen_nganh_kt = 6;
  string id_nganh = 7;
  map<string, string> parameters = 20;
}

message ChuyenCapChatLuongScheduleItem {
  string id = 1;
  string ten_chuyen_cap_chat_luong = 2;
  string can_cu = 3;
  string so_menh_lenh = 4;
  string cap_chat_luong = 5;
  string don_vi_thuc_hien = 6;
  string ghi_chu = 7;
  repeated ChuyenCapChatLuongScheduleTrangBiItem ds_trang_bi = 8;
  map<string, string> parameters = 9;
  google.protobuf.StringValue nguoi_tao = 10;
  google.protobuf.StringValue nguoi_sua = 11;
  google.protobuf.Timestamp ngay_tao = 12;
  google.protobuf.Timestamp ngay_sua = 13;
  int32 version = 14;
}

message ChuyenCapChatLuongScheduleGridItem {
  string id = 1;
  string ten_chuyen_cap_chat_luong = 2;
  string can_cu = 3;
  string so_menh_lenh = 4;
  string cap_chat_luong = 5;
  string don_vi_thuc_hien = 6;
  int32 so_trang_bi = 7;
  string nguoi_sua = 8;
  google.protobuf.Timestamp ngay_sua = 9;
}

message GetListChuyenCapChatLuongScheduleRequest {
  google.protobuf.StringValue don_vi_thuc_hien = 1;
  google.protobuf.StringValue id_chuyen_nganh_kt = 2;
  google.protobuf.StringValue search_text = 3;
}

message GetListChuyenCapChatLuongScheduleResponse {
  repeated ChuyenCapChatLuongScheduleGridItem items = 1;
  bool success = 2;
  string message = 3;
}

message GetChuyenCapChatLuongScheduleRequest {
  string id = 1;
}

message GetChuyenCapChatLuongScheduleResponse {
  ChuyenCapChatLuongScheduleItem item = 1;
  bool success = 2;
  string message = 3;
}

message SaveChuyenCapChatLuongScheduleRequest {
  ChuyenCapChatLuongScheduleItem item = 1;
  google.protobuf.Int32Value expected_version = 2;
}

message SaveChuyenCapChatLuongScheduleResponse {
  string id = 1;
  bool success = 2;
  string message = 3;
}

message DeleteChuyenCapChatLuongScheduleRequest {
  string id = 1;
}

message GetListChuyenCapChatLuongScheduleByTrangBiRequest {
  string id_trang_bi = 1;
  int32 nhom_trang_bi = 2;
}

message GetListChuyenCapChatLuongScheduleByTrangBiResponse {
  repeated ChuyenCapChatLuongScheduleGridItem items = 1;
  bool success = 2;
  string message = 3;
}

service ChuyenCapChatLuongScheduleService {
  rpc GetListChuyenCapChatLuongSchedule(GetListChuyenCapChatLuongScheduleRequest) returns (GetListChuyenCapChatLuongScheduleResponse);
  rpc GetChuyenCapChatLuongSchedule(GetChuyenCapChatLuongScheduleRequest) returns (GetChuyenCapChatLuongScheduleResponse);
  rpc SaveChuyenCapChatLuongSchedule(SaveChuyenCapChatLuongScheduleRequest) returns (SaveChuyenCapChatLuongScheduleResponse);
  rpc DeleteChuyenCapChatLuongSchedule(DeleteChuyenCapChatLuongScheduleRequest) returns (Base.DeleteBaseResponse);
  rpc GetListChuyenCapChatLuongScheduleByTrangBi(GetListChuyenCapChatLuongScheduleByTrangBiRequest) returns (GetListChuyenCapChatLuongScheduleByTrangBiResponse);
}
